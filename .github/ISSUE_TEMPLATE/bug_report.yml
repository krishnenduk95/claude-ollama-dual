name: Bug Report
description: Something in claude-dual isn't working as expected
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in what applies — the more context, the faster we can help.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: v20.11.0
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`
      placeholder: '2.x.x'
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installed via
      options:
        - One-shot installer (install.sh / install.ps1)
        - Manual install
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: what-you-did
    attributes:
      label: What did you do?
      description: Exact command(s), prompt text, or steps to reproduce
      placeholder: |
        1. Ran `claude-dual` in /path/to/project
        2. Asked Opus to "use glm-worker to ..."
        3. ...
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from `tail -50 ~/.claude-dual/proxy.log` or the equivalent on Windows
      render: text

  - type: checkboxes
    id: secret-check
    attributes:
      label: Safety check
      options:
        - label: I confirm the logs I'm pasting contain no API keys, OAuth tokens, or PII
          required: true
